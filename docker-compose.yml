services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "7000:7000"
    environment:
      VITE_API_URL: http://localhost:7001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

  backend:
    build:
      context: ./backend
    ports:
      - "7001:7001"
    env_file:
      - ./backend/.env
    environment:
      PORT: 7001
      ALERT_STORAGE_DIR: /app/runtime
      FX_LATEST_CACHE_TTL_MS: 900000
      FX_HISTORY_CACHE_TTL_MS: 86400000
      ALERT_POLL_INTERVAL_MS: 900000
      ALERT_RUN_ON_STARTUP: "false"
    volumes:
      - ./backend:/app
      - ./backend/runtime:/app/runtime
      - /app/node_modules
    command: npm run dev

  postgres:
    image: postgres:16-alpine
    profiles: ["future"]
    ports:
      - "7002:5432"
    environment:
      POSTGRES_DB: currency_tracker
      POSTGRES_USER: currency_tracker
      POSTGRES_PASSWORD: currency_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    profiles: ["future"]
    ports:
      - "7003:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
